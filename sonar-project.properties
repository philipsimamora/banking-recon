# sonar-project.properties

sonar.projectKey=banking-recon
sonar.projectName=Banking Reconciliation Microservice

# Root sources — arahkan hanya ke subfolder service, bukan '.'
sonar.modules=transaction-service,statement-service,reconciliation-service

# ── Per-module configuration ──────────────────────────────

transaction-service.sonar.projectName=Transaction Service
transaction-service.sonar.sources=transaction-service
transaction-service.sonar.tests=transaction-service/tests
transaction-service.sonar.python.version=3

statement-service.sonar.projectName=Statement Service
statement-service.sonar.sources=statement-service
statement-service.sonar.tests=statement-service/tests
statement-service.sonar.python.version=3

reconciliation-service.sonar.projectName=Reconciliation Service
reconciliation-service.sonar.sources=reconciliation-service
reconciliation-service.sonar.tests=reconciliation-service/tests
reconciliation-service.sonar.python.version=3

# ── Exclusions global ─────────────────────────────────────
sonar.exclusions=**/venv/**,**/__pycache__/**,**/*.pyc,**/tests/**

# ── Test inclusions ───────────────────────────────────────
sonar.test.inclusions=**/tests/**